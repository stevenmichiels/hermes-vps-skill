n8n_enable_service: false
n8n_image: "docker.n8n.io/n8nio/n8n:2.21.7"
n8n_timezone: "Europe/Brussels"

n8n_env_dir: "/etc/n8n"
n8n_env_file: "/etc/n8n/.env"
n8n_compose_file: "/etc/n8n/docker-compose.yml"
n8n_data_dir: "/var/lib/n8n"

n8n_bind_address: "127.0.0.1"
n8n_host_port: 5678
n8n_public_hostname: ""
n8n_editor_base_url: "http://127.0.0.1:5678/"
n8n_webhook_url: ""
n8n_proxy_hops: 1
n8n_secure_cookie: false
n8n_tailscale_source_cidr: "{{ tailscale_ssh_source_cidr | default('100.64.0.0/10') }}"
n8n_allow_tailscale_ufw: true

n8n_container_uid: "1000"
n8n_container_gid: "1000"
n8n_compose_pull: false

n8n_sqlite_backup_enabled: false
n8n_sqlite_backup_timer_enabled: false
n8n_sqlite_backup_script_path: "/usr/local/sbin/hermes-n8n-sqlite-backup"
n8n_sqlite_backup_dir: "/var/backups/n8n"
n8n_sqlite_backup_age_recipient: ""
n8n_sqlite_backup_sqlite_image: "keinos/sqlite3@sha256:__SET_ME__"
n8n_sqlite_backup_on_calendar: "daily"
