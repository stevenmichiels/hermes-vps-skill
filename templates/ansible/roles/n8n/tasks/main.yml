- name: Validate n8n private bind address
  assert:
    that:
      - >-
        n8n_bind_address == '127.0.0.1' or
        (n8n_bind_address is match('^100\\.(6[4-9]|[7-9][0-9]|1[01][0-9]|12[0-7])\\.'))
    fail_msg: >
      n8n_bind_address must be 127.0.0.1 or a Tailscale 100.64.0.0/10 address.
      This role intentionally does not support public binds.

- name: Validate n8n public webhook hostname
  assert:
    that:
      - n8n_public_hostname is not search('://')
      - n8n_public_hostname is not search('/')
      - >-
        (n8n_public_hostname | length == 0) or
        (n8n_webhook_url | default('https://' ~ n8n_public_hostname ~ '/', true)) is match('^https://[^/]+/$')
    fail_msg: >
      n8n_public_hostname must be a hostname without scheme/path, and
      n8n_webhook_url must be an https:// URL ending in /.

- name: Install n8n container runtime packages
  apt:
    name:
      - docker.io
      - docker-compose-v2
    state: present

- name: Ensure Docker daemon is enabled and started
  systemd:
    name: docker
    enabled: true
    state: started

- name: Ensure n8n directories exist
  file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ n8n_env_dir }}"
      owner: root
      group: root
      mode: "0750"
    - path: "{{ n8n_data_dir }}"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ n8n_data_dir }}/data"
      owner: "{{ n8n_container_uid }}"
      group: "{{ n8n_container_gid }}"
      mode: "0700"
    - path: "{{ n8n_data_dir }}/files"
      owner: "{{ n8n_container_uid }}"
      group: "{{ n8n_container_gid }}"
      mode: "0770"

- name: Create n8n env file if missing
  template:
    src: env.j2
    dest: "{{ n8n_env_file }}"
    owner: root
    group: root
    mode: "0640"
    force: false

- name: Install n8n compose file
  template:
    src: docker-compose.yml.j2
    dest: "{{ n8n_compose_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Allow n8n from Tailscale only when bound to a Tailscale address
  ufw:
    rule: allow
    port: "{{ n8n_host_port | string }}"
    proto: tcp
    from_ip: "{{ n8n_tailscale_source_cidr }}"
  when:
    - n8n_allow_tailscale_ufw | bool
    - n8n_bind_address is match('^100\\.(6[4-9]|[7-9][0-9]|1[01][0-9]|12[0-7])\\.')

- name: Read n8n env file before enabling service
  slurp:
    src: "{{ n8n_env_file }}"
  register: n8n_env_raw
  no_log: true
  when: n8n_enable_service | bool

- name: Refuse to start n8n without explicit encryption key
  assert:
    that:
      - "'__SET_ME__' not in (n8n_env_raw.content | b64decode)"
      - >-
        ((n8n_env_raw.content | b64decode).splitlines()
        | select('match', '^N8N_ENCRYPTION_KEY=.{32,}$')
        | list
        | length) == 1
      - >-
        ((n8n_env_raw.content | b64decode).splitlines()
        | select('match', '^N8N_USER_MANAGEMENT_JWT_SECRET=.{32,}$')
        | list
        | length) == 1
    fail_msg: >
      Set real N8N_ENCRYPTION_KEY and N8N_USER_MANAGEMENT_JWT_SECRET values in
      {{ n8n_env_file }} on the VPS before enabling n8n. Do not commit or paste
      these keys into chat.
  no_log: true
  when: n8n_enable_service | bool

- name: Validate n8n SQLite backup settings
  assert:
    that:
      - n8n_sqlite_backup_age_recipient | length > 0
      - n8n_sqlite_backup_sqlite_image is search('@sha256:')
      - "'__SET_ME__' not in n8n_sqlite_backup_sqlite_image"
    fail_msg: >
      Set n8n_sqlite_backup_age_recipient and a pinned
      n8n_sqlite_backup_sqlite_image digest before enabling online backups.
  when: n8n_sqlite_backup_enabled | bool

- name: Install n8n SQLite backup packages
  apt:
    name:
      - age
    state: present
  when: n8n_sqlite_backup_enabled | bool

- name: Ensure n8n backup directory exists
  file:
    path: "{{ n8n_sqlite_backup_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  when: n8n_sqlite_backup_enabled | bool

- name: Install n8n SQLite backup script
  template:
    src: hermes-n8n-sqlite-backup.j2
    dest: "{{ n8n_sqlite_backup_script_path }}"
    owner: root
    group: root
    mode: "0750"
  when: n8n_sqlite_backup_enabled | bool

- name: Install n8n SQLite backup systemd service
  template:
    src: hermes-n8n-sqlite-backup.service.j2
    dest: /etc/systemd/system/hermes-n8n-sqlite-backup.service
    owner: root
    group: root
    mode: "0644"
  register: n8n_sqlite_backup_service_template
  when: n8n_sqlite_backup_enabled | bool

- name: Install n8n SQLite backup systemd timer
  template:
    src: hermes-n8n-sqlite-backup.timer.j2
    dest: /etc/systemd/system/hermes-n8n-sqlite-backup.timer
    owner: root
    group: root
    mode: "0644"
  register: n8n_sqlite_backup_timer_template
  when: n8n_sqlite_backup_enabled | bool

- name: Reload systemd for n8n SQLite backup units
  systemd:
    daemon_reload: true
  when:
    - n8n_sqlite_backup_enabled | bool
    - >-
      (n8n_sqlite_backup_service_template is defined and n8n_sqlite_backup_service_template.changed) or
      (n8n_sqlite_backup_timer_template is defined and n8n_sqlite_backup_timer_template.changed)

- name: Manage n8n SQLite backup timer
  systemd:
    name: hermes-n8n-sqlite-backup.timer
    enabled: "{{ n8n_sqlite_backup_timer_enabled | bool }}"
    state: "{{ (n8n_sqlite_backup_timer_enabled | bool) | ternary('started', 'stopped') }}"
  when: n8n_sqlite_backup_enabled | bool

- name: Pull n8n image
  command: docker compose -f "{{ n8n_compose_file }}" pull
  register: n8n_compose_pull_result
  changed_when: >
    (
      (n8n_compose_pull_result.stdout | default('')) ~ '\n' ~
      (n8n_compose_pull_result.stderr | default(''))
    ) is search('Downloaded newer image|Pull complete|Status: Downloaded newer image|Downloaded|Pulling fs layer')
  when:
    - n8n_enable_service | bool
    - n8n_compose_pull | bool

- name: Start n8n container stack
  command: docker compose -f "{{ n8n_compose_file }}" up -d
  register: n8n_compose_up_result
  changed_when: >
    (
      (n8n_compose_up_result.stdout | default('')) ~ '\n' ~
      (n8n_compose_up_result.stderr | default(''))
    ) is search('Creating|Recreating|Starting|Stopping|Removing|Created|Pulled')
  when: n8n_enable_service | bool

- name: Stop n8n container stack when disabled
  command: docker compose -f "{{ n8n_compose_file }}" down
  failed_when: false
  changed_when: false
  when: not (n8n_enable_service | bool)
