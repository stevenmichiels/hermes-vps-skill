name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Check Terraform formatting
        run: terraform -chdir=templates/infra fmt -check

      - name: Initialize Terraform without backend
        run: terraform -chdir=templates/infra init -backend=false -input=false

      - name: Validate Terraform
        run: terraform -chdir=templates/infra validate

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Ansible
        run: python -m pip install --upgrade pip ansible-core

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r templates/ansible/requirements.yml

      - name: Check Ansible syntax
        working-directory: templates/ansible
        run: ansible-playbook -i inventory.ini.example site.yml --syntax-check
